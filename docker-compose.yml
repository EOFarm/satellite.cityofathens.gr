version: "3.9"

services:
  db:
    container_name: db
    image: postgis/postgis:17-3.5
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/postgresql/data/pgdata
    ports:
      - 5432:5432

  pycsw:
    image: geopython/pycsw:eoepca-staging
    container_name: pycsw
    ports:
      - 8000:8000
    env_file:
      - .env
    volumes:
      - ./pycsw/pycsw.yml:/etc/pycsw/pycsw.yml
    depends_on:
      - db
    restart: unless-stopped

  titiler:
    image: ghcr.io/developmentseed/titiler:0.24.1
    container_name: titiler
    command: ["uvicorn", "titiler.application.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1", "--proxy-headers", "--forwarded-allow-ips='*'", "--root-path=/titiler"]
    environment:
      - CORS_ORIGINS=*
    restart: unless-stopped

  nginx:
    image: nginx:1.29.3
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/static:/usr/share/nginx/html:ro
      - ./data:/data
    depends_on:
      - pycsw
      - titiler
    restart: unless-stopped

volumes:
  db-data:
